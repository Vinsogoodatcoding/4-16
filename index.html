<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5.collide2d"></script>
    <script src="player.js"></script>
    <script src="obstacle.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<script>
let w = window.innerWidth;
let h = window.innerHeight;
//instantiate object
var playerObj;
var barrier;
var hit = false

function setup() {
    createCanvas(w,h)
    
}



function draw() {
    clear()
    player.show()  
    player.update()
    obstacle.show()
    hit = collideRectCircle(obstacle.x,obstacle.y,400,400,player.x,player.y,50)
    console.log(hit) //temporary to detect if it is working

    if (obstacle.x < -400) {
        obstacle.x = window.innerWidth
    }
    if (hit === true) {
        player.speed = 2
    }
}

function obstacle() {
    this.x = window.innerWidth
    this.y = 100

    this.show = function() {
        fill(0,0,255)
        rect(this.x, this.y, 400,400)
    }
}

</script>
</body>
</html>
